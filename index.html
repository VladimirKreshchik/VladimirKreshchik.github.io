<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Иван Толстов — Контакты</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #111111;
      --muted: #6b6b6b;
      --line: #e8e8e8;
      --accent: #222222;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 40px 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .contacts {
      display: grid;
      gap: 14px;
    }

    .contact {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: 0.2s ease;
      background: #fff;
    }

    .contact:hover {
      transform: translateY(-1px);
      border-color: #d8d8d8;
      background: #fcfcfc;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .label {
      font-size: 14px;
      color: var(--muted);
    }

    .value {
      font-size: 17px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arrow {
      font-size: 18px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 18px;
      }

      h1 {
        font-size: 28px;
      }

      .value {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Иван Толстов</h1>
    <p class="subtitle">Личные контакты</p>

    <section class="contacts">
      <a class="contact" href="#" target="_blank" rel="noopener noreferrer">
        <div class="left">
          <span class="label">МАКС</span>
          <span class="value">В разработке</span>
        </div>
        <span class="arrow">↗</span>
      </a>

      <a class="contact" href="https://t.me/lil_hmuriy" target="_blank" rel="noopener noreferrer">
        <div class="left">
          <span class="label">Telegram</span>
          <span class="value">@lil_hmuriy</span>
        </div>
        <span class="arrow">↗</span>
      </a>

      <a class="contact" href="#" target="_blank" rel="noopener noreferrer">
        <div class="left">
          <span class="label">WeChat</span>
          <span class="value">В разработке</span>
        </div>
        <span class="arrow">↗</span>
      </a>

      <a class="contact" href="mailto:ivan.tolstov@example.com">
        <div class="left">
          <span class="label">Email</span>
          <span class="value">В разработке</span>
        </div>
        <span class="arrow">↗</span>
      </a>
    </section>

    <p class="footer">
      © Иван Толстов
    </p>
  </main>
</body>
</html>
